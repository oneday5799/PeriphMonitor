name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Update version in config files
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"

          # Update tauri.conf.json
          $tauri = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json" -Encoding UTF8

          # Update Cargo.toml
          $cargo = Get-Content "src-tauri/Cargo.toml" -Raw
          $cargo = $cargo -replace 'version = ".*"', "version = `"$version`""
          Set-Content "src-tauri/Cargo.toml" $cargo -Encoding UTF8 -NoNewline

          # Update package.json
          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "package.json" -Encoding UTF8

      - name: Install npm dependencies
        run: npm install

      - name: Build NSIS installer
        run: npm run tauri build -- --bundles nsis

      - name: Check if pre-release
        id: prerelease
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $isPre = $tag -match '-'
          echo "IS_PRERELEASE=$isPre" >> $env:GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE == 'True' }}
          files: src-tauri/target/release/bundle/nsis/*.exe
          generate_release_notes: true
