name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x64
            rust_target: x86_64-pc-windows-msvc
            nsis_arch: x64
          - target: arm64
            rust_target: aarch64-pc-windows-msvc
            nsis_arch: arm64

    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Update version in config files
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"

          # Update tauri.conf.json
          $tauri = Get-Content "src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $tauri.version = $version
          $tauri | ConvertTo-Json -Depth 10 | Set-Content "src-tauri/tauri.conf.json" -Encoding UTF8

          # Update Cargo.toml (only update version in [package] section)
          $cargo = Get-Content "src-tauri/Cargo.toml"
          $inPackage = $false
          for ($i = 0; $i -lt $cargo.Length; $i++) {
            if ($cargo[$i] -match '^\[package\]') { $inPackage = $true }
            elseif ($cargo[$i] -match '^\[') { $inPackage = $false }
            if ($inPackage -and $cargo[$i] -match '^version\s*=\s*".*"') {
              $cargo[$i] = "version = `"$version`""
            }
          }
          $cargo -join "`n" | Set-Content "src-tauri/Cargo.toml" -Encoding UTF8 -NoNewline

          # Update package.json
          $pkg = Get-Content "package.json" -Raw | ConvertFrom-Json
          $pkg.version = $version
          $pkg | ConvertTo-Json -Depth 10 | Set-Content "package.json" -Encoding UTF8

      - name: Install npm dependencies
        run: npm install

      - name: Build NSIS installer (${{ matrix.target }})
        run: npm run tauri build -- --bundles nsis --target ${{ matrix.rust_target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.rust_target }}/release/bundle/nsis/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Check if pre-release
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-* ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.IS_PRERELEASE == 'true' }}
          files: artifacts/*.exe
          generate_release_notes: true
