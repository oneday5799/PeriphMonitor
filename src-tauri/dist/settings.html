<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 外设监控</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/settings.css">
</head>
<body oncontextmenu="return false">
  <div class="settings-container" id="app">
    <h1 class="page-title">设置</h1>

    <!-- Tab bar -->
    <div class="tab-bar">
      <div class="tab-item active" data-tab="general">通用设置</div>
      <div class="tab-item" data-tab="device">设备信息设置</div>
      <div class="tab-item" data-tab="audio">音量控制设置</div>
    </div>

    <!-- Tab: General -->
    <div class="tab-content active" id="tab-general">
      <div class="setting-row">
        <span class="setting-label">开机自启动</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-autostart">
          <span class="slider"></span>
        </label>
      </div>

      <div class="separator"></div>

      <div class="setting-row">
        <span class="setting-label">运行日志</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-log">
          <span class="slider"></span>
        </label>
      </div>
      <div class="setting-row">
        <span class="setting-label">日志级别</span>
        <select class="setting-select" id="log-level">
          <option value="standard">标准</option>
          <option value="detailed">详细</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">保留时长</span>
        <select class="setting-select" id="log-retention">
          <option value="once">一次</option>
          <option value="one_day">一天</option>
          <option value="three_days">三天</option>
          <option value="one_week">一周</option>
          <option value="one_month">一月</option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">查看日志</span>
        <button class="add-device-btn" id="btn-log-dir">打开目录</button>
      </div>
    </div>

    <!-- Tab: Device Info -->
    <div class="tab-content" id="tab-device">
      <div class="setting-row">
        <span class="setting-label">设备过滤</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-filter">
          <span class="slider"></span>
        </label>
      </div>
      <div class="filter-regex-wrap" id="filter-regex-wrap">
        <textarea id="filter-regex" class="filter-textarea" rows="4" spellcheck="false"></textarea>
        <div class="filter-hint">匹配设备名称的正则表达式，不区分大小写。匹配到的设备将被隐藏。</div>
      </div>

      <div class="setting-row">
        <span class="setting-label">设备去重</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-dedup">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-row">
        <span class="setting-label">显示无名称蓝牙设备</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-unnamed-bt">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-row setting-row-col">
        <div class="setting-row-top">
          <span class="setting-label">使用系统蓝牙连接
            <span class="tooltip-trigger">?
              <span class="tooltip-content">应用内通过启用/禁用蓝牙服务来实现连接/断开蓝牙设备连接，可能会出现兼容性问题，如果出现问题可打开此开关通过跳转到系统蓝牙设置页进行管理。</span>
            </span>
          </span>
          <label class="toggle">
            <input type="checkbox" id="toggle-use-system-bt">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="separator"></div>

      <div class="setting-row">
        <span class="setting-label">自定义 2.4G 设备列表
            <a class="help-link" href="https://github.com/oneday5799/PeriphMonitor#%E6%B7%BB%E5%8A%A0%E8%87%AA%E5%AE%9A%E4%B9%89-24g-%E8%AE%BE%E5%A4%87" target="_blank" rel="noopener" title="点击查看如何添加 2.4G 设备">?</a>
          </span>
        <button class="add-device-btn" id="btn-add-24g">打开</button>
      </div>

      <div class="separator"></div>

      <div class="setting-row">
        <span class="setting-label">设备信息页设备列表</span>
      </div>
      <div class="device-groups" id="device-groups"></div>
    </div>

    <!-- Tab: Audio -->
    <div class="tab-content" id="tab-audio">
      <div class="setting-row">
        <span class="setting-label">音量控制页设备列表</span>
      </div>
      <div class="audio-device-groups" id="audio-device-groups"></div>
    </div>
  </div>

  <script>
    document.addEventListener("contextmenu", e => e.preventDefault());
  </script>
  <script src="scripts/common.js"></script>
  <script src="scripts/settings.js"></script>
</body>
</html>
