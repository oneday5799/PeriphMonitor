<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 外设监控</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/settings.css">
</head>
<body oncontextmenu="return false">
  <div class="settings-container" id="app">
    <h1 class="page-title">设置</h1>

    <!-- Auto start -->
    <div class="setting-row">
      <span class="setting-label">开机自启动</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-autostart">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Device filter -->
    <div class="setting-row">
      <span class="setting-label">设备过滤</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-filter">
        <span class="slider"></span>
      </label>
    </div>
    <div class="filter-regex-wrap" id="filter-regex-wrap">
      <textarea id="filter-regex" class="filter-textarea" rows="4" spellcheck="false"></textarea>
      <div class="filter-hint">匹配设备名称的正则表达式，不区分大小写。匹配到的设备将被隐藏。</div>
    </div>

    <!-- Device dedup -->
    <div class="setting-row">
      <span class="setting-label">设备去重</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-dedup">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Show unnamed BT devices -->
    <div class="setting-row">
      <span class="setting-label">显示无名称蓝牙设备</span>
      <label class="toggle">
        <input type="checkbox" id="toggle-unnamed-bt">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Use system Bluetooth connection -->
    <div class="setting-row setting-row-col">
      <div class="setting-row-top">
        <span class="setting-label">使用系统蓝牙连接
          <span class="tooltip-trigger">?
            <span class="tooltip-content">应用内通过启用/禁用蓝牙服务来实现连接/断开蓝牙设备连接，可能会出现兼容性问题，如果出现问题可打开此开关通过跳转到系统蓝牙设置页进行管理。</span>
          </span>
        </span>
        <label class="toggle">
          <input type="checkbox" id="toggle-use-system-bt">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div class="separator"></div>

    <!-- Open 2.4G device list -->
    <div class="setting-row">
      <span class="setting-label">查看/修改 2.4G 设备列表</span>
      <button class="add-device-btn" id="btn-add-24g">打开</button>
    </div>

    <div class="separator"></div>

    <!-- Device groups -->
    <div class="device-groups" id="device-groups"></div>
  </div>

  <script>
    document.addEventListener("contextmenu", e => e.preventDefault());
  </script>
  <script src="scripts/common.js"></script>
  <script src="scripts/settings.js"></script>
</body>
</html>
